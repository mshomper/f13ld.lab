<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F13LD.lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lab.css">
</head>
<body>
<div id="app">

  <!-- ============ HEADER ============ -->
  <div class="f13ld-header">
    <div class="fh-left">
      <a class="fh-brand" href="https://f13ld.app" target="_blank">
        <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs><clipPath id="f13-clip"><path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z"/></clipPath></defs>
          <path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z" fill="#111e13" stroke="#1D9E75" stroke-width="5"/>
          <g clip-path="url(#f13-clip)" fill="none">
            <path d="M0,50 Q25,40 50,50 Q75,60 100,50" stroke="#c8f542" stroke-width="6"/>
            <path d="M50,0 Q40,25 50,50 Q60,75 50,100" stroke="#c8f542" stroke-width="6"/>
            <path d="M0,31 Q25,21 50,31 Q75,41 100,31" stroke="#2c4e30" stroke-width="3"/>
            <path d="M0,69 Q25,59 50,69 Q75,79 100,69" stroke="#2c4e30" stroke-width="3"/>
            <path d="M31,0 Q21,25 31,50 Q41,75 31,100" stroke="#2c4e30" stroke-width="3"/>
            <path d="M69,0 Q59,25 69,50 Q79,75 69,100" stroke="#2c4e30" stroke-width="3"/>
            <circle cx="50" cy="50" r="7" fill="#c8f542"/>
          </g>
          <path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z" fill="none" stroke="#1D9E75" stroke-width="5"/>
        </svg>
        <div class="fh-wordmark">
          <span style="color:#1D9E75">F</span><span style="color:#c8f542">1</span><span style="color:#c8f542">3</span><span style="color:#1D9E75">LD</span>
        </div>
      </a>
      <div class="fh-divider"></div>
      <div class="fh-tool-name">LAB</div>
    </div>
    <div class="fh-right">
      <button class="fh-action-btn ghost" id="addDesignBtn" onclick="onAddDesignClick()">+ Add Design</button>
      <button class="fh-action-btn ghost" id="exportPdfBtn" onclick="onExportPdfClick()" disabled>⤓ Export PDF</button>
      <button class="fh-action-btn" id="meshHandoffBtn" onclick="onMeshHandoffClick()" disabled>⬡ Open in F13LD.mesh</button>
      <span class="fh-version">v0.7.0</span>
      <div class="fh-icon">
        <svg width="18" height="18" viewBox="0 0 40 40">
          <path d="M20 3 L20 8" stroke="#8C2A2E" stroke-width="1.9" stroke-linecap="round"/>
          <path d="M16.5 5.5 L20 9 L23.5 5.5" fill="none" stroke="#8C2A2E" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 37 L20 32" stroke="#8C2A2E" stroke-width="1.9" stroke-linecap="round"/>
          <path d="M16.5 34.5 L20 31 L23.5 34.5" fill="none" stroke="#8C2A2E" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 12 H28 C32 16 32 24 28 28 H12 C8 24 8 16 12 12 Z" fill="none" stroke="#8C2A2E" stroke-width="1.9" stroke-linejoin="round"/>
          <circle cx="30" cy="20" r="2.4" fill="#c8f542" stroke="#8C2A2E" stroke-width="1.1"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ============ VIEW MODE STRIP ============ -->
  <div class="view-strip">
    <span class="view-label">VIEW</span>
    <div class="view-tabs" id="viewTabs">
      <button class="view-tab active" data-mode="geom"    onclick="onViewModeClick('geom')">Geometry</button>
      <button class="view-tab"        data-mode="deform"  onclick="onViewModeClick('deform')">Deformed</button>
      <button class="view-tab"        data-mode="stress"  onclick="onViewModeClick('stress')">Stress field</button>
      <button class="view-tab"        data-mode="stiff"   onclick="onViewModeClick('stiff')">Stiffness ⊕</button>
      <button class="view-tab"        data-mode="thermal" onclick="onViewModeClick('thermal')">Thermal κ</button>
      <button class="view-tab"        data-mode="buckle"  onclick="onViewModeClick('buckle')">Buckling modes</button>
      <button class="view-tab"        data-mode="curve"   onclick="onViewModeClick('curve')">Nonlinear</button>
    </div>
    <!-- A.3.3 — Stress-normalization toggle (per-design auto vs shared linear).
         Hidden in non-stress modes; toggled via onViewModeClick. -->
    <div class="stress-norm-toggle-group" id="stressNormToggle">
      <span class="stress-norm-label">σ_VM scale</span>
      <button class="stress-norm-btn active" data-norm="per"
              onclick="onStressNormToggleClick('per')"
              title="Per-design auto-calibration. Each tile uses its own p95 cap and auto-gamma for spatial pattern discovery.">per</button>
      <button class="stress-norm-btn" data-norm="shared"
              onclick="onStressNormToggleClick('shared')"
              title="Shared scale across designs. Global p95 cap, linear cividis. 'Yellow' means the same σ_VM everywhere — for cross-design comparison.">shared</button>
    </div>
    <div class="right">
      <span class="pill" id="loadedPill">3 of 3 designs loaded</span>
      <!-- Phase-6 tie-up #2 — branded "still working" spinner (shown only while a run is live) -->
      <span class="solver-spinner" id="solverSpinner" aria-hidden="true" title="Solving…">
        <svg width="16" height="16" viewBox="0 0 40 40">
          <path class="ss-hex" d="M20 3 L34 11 L34 29 L20 37 L6 29 L6 11 Z" fill="none" stroke="#2c4e30" stroke-width="2"/>
          <g class="ss-arcs">
            <path d="M20 5 A15 15 0 0 1 34 18" fill="none" stroke="#c8f542" stroke-width="3" stroke-linecap="round"/>
            <path d="M20 35 A15 15 0 0 1 6 22" fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round"/>
          </g>
          <circle class="ss-core" cx="20" cy="20" r="3.2" fill="#c8f542"/>
        </svg>
      </span>
      <span class="pill" id="solverPill">solver idle</span>
    </div>
  </div>

  <!-- ============ COMPARISON AREA ============ -->
  <div class="compare" id="compareGrid"></div>
  <div class="compare merged" id="mergedView" style="display:none">
    <div class="merged-plot" id="mergedPlot"></div>
    <!-- Phase-6 tie-up #1 — up to 3 animated cubes show the looped crush deformation
         colored by plastic strain (alpha), built by renderNonlinearViz() -->
    <div class="merged-cubes" id="mergedCubes"></div>
    <!-- Phase-6 readout pass — per-design crush metrics (Crush Modulus, Yield, Load) -->
    <div class="merged-metrics" id="mergedMetrics"></div>
    <div class="merged-scrubber" id="mergedScrubber"></div>
  </div>

  <!-- ============ CONTROLS PANEL ============ -->
  <div class="controls">
    <div class="ctrl-block">
      <div class="ctrl-label">Physics modes</div>
      <div class="ctrl-row" id="physRow">
        <div class="phys-toggle on" data-phys="elastic" onclick="onPhysToggle(this)"><span class="check">✓</span>Elastic</div>
        <div class="phys-toggle on" data-phys="buckle"  onclick="onPhysToggle(this)"><span class="check">✓</span>Buckling</div>
        <div class="phys-toggle on" data-phys="nonlin"  onclick="onPhysToggle(this)"><span class="check">✓</span>Nonlinear · J2 + geom</div>
        <div class="phys-toggle"    data-phys="thermal" onclick="onPhysToggle(this)"><span class="check">✓</span>Thermal κ</div>
        <div class="phys-toggle on" id="prunePill" onclick="onPruneToggle(this)" title="Keep only the largest periodically-connected solid component before solving — removes floating islands that cause spurious buckling/crush results"><span class="check">✓</span>Prune islands</div>
      </div>
    </div>

    <div class="ctrl-block">
      <div class="ctrl-label">Solver configuration</div>
      <div class="ctrl-row">
        <div class="spec-pill lab" id="gridPill" onclick="onGridPillClick()" title="Auto-pick grid resolution">
          <span class="key">Grid</span> <span class="v" id="gridPillVal">Auto</span> <span class="caret">▾</span>
        </div>
        <div class="spec-pill lab" id="bucklePill" onclick="onBucklePillClick()" title="Buckling grid resolution (CPU reference oracle)">
          <span class="key">Buckle</span> <span class="v" id="bucklePillVal">8³</span> <span class="caret">▾</span>
        </div>
        <div class="spec-pill lab" id="nonlinPill" onclick="onNonlinPillClick()" title="Nonlinear crush grid resolution (GPU J2 plasticity)">
          <span class="key">Nonlin</span> <span class="v" id="nonlinPillVal">16³</span> <span class="caret">▾</span>
        </div>
        <div class="spec-pill lab" id="nonlinCapPill" onclick="onNonlinCapPillClick()" title="Nonlinear crush strain cap (adaptive crush stops here)">
          <span class="key">Crush ε</span> <span class="v" id="nonlinCapPillVal">5%</span> <span class="caret">▾</span>
        </div>
        <div class="spec-pill" id="nonlinAxisPill" title="Nonlinear crush load axis">
          <span class="key">Crush axis</span>
          <select id="nonlinAxisSel" onchange="onNonlinAxisChange(this.value)" style="background:#0d1410;color:#cfe6dc;border:1px solid #2c4e30;border-radius:4px;font-family:inherit;font-size:inherit;padding:1px 6px;margin-left:4px;">
            <option value="zz" selected>ZZ</option>
            <option value="xx">XX</option>
            <option value="yy">YY</option>
          </select>
        </div>
        <div class="spec-pill" id="hardwarePill"><span class="key">Hardware</span> <span class="v" id="hardwarePillVal">detecting…</span></div>
        <div class="spec-pill"><span class="key">Designs</span> <span class="v" id="designCountVal">3</span></div>
        <div class="spec-pill"><span class="key">Est.</span> <span class="v" id="estTimeVal">~7.5 min</span></div>
      </div>
    </div>

    <div class="run-block">
      <button class="run-btn" id="runBtn" onclick="onRunClick()">▶ Run All</button>
    </div>
  </div>

  <!-- progress row -->
  <div class="prog-row" id="progRow" style="display:none">
    <span class="prog-status" id="progStatus">Idle</span>
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <span class="prog-eta">ETA <span id="progEta">—:—</span></span>
  </div>

</div>

<!-- ===== JS load order: lower numbers load first ===== -->
<script src="00-mock-data.js"></script>
<script src="10-hardware.js"></script>
<script src="11-webgpu-device.js"></script>
<script src="12-fft-plan.js"></script>
<script src="13-kernels.js"></script>
<script src="13b-kernels-new.js"></script>
<script src="14-rasterizer.js"></script>
<script src="14a-connectivity.js"></script>
<script src="15-demo-recipes.js"></script>
<script src="15b-demo-recipes-new.js"></script>
<script src="16-elastic-solver.js"></script>
<script src="16a-elastic-cpu-ref-full.js"></script>
<script src="16b-elastic-solver-full.js"></script>
<script src="16c-buckling-cpu-ref.js"></script>
<script src="16e-buckling-cpu-worker.js"></script>
<script src="16f-nonlinear-cpu-ref.js"></script>
<script src="16g-nonlinear-solver.js"></script>
<script src="18-stokes-cpu-ref.js"></script>
<script src="19-stokes-solver.js"></script>
<script src="20-svg-mocks.js"></script>
<script src="21-raymarcher.js"></script>
<script src="22-stiffness-viz.js"></script>
<script src="30-view-tabs.js"></script>
<script src="40-design-grid.js"></script>
<script src="50-controls.js"></script>
<script src="60-add-design.js"></script>
<script src="99-init.js"></script>

</body>
</html>
